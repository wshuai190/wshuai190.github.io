name: Build and Deploy Jekyll

on:
  push:
    branches: ["master"]
  # Also rebuild when the daily metrics workflow finishes successfully.
  # Needed because commits pushed by GITHUB_TOKEN don't fire other workflows
  # via the `push` event (GitHub's recursion safeguard).
  workflow_run:
    workflows: ["Update Google Scholar Metrics"]
    types: [completed]
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the upstream metrics
    # workflow actually succeeded (workflow_run fires regardless of result).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
